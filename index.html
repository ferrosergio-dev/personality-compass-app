<!DOCTYPE html>
<html>
<head>
    <!-- Seznam.cz -->
    <meta name="seznam-wmt" content="d4RTpUnfyfewpBPevJV9lnIjijSdPj7K" />
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Compass - Redirecting</title>
    <meta http-equiv="refresh" content="0; url=/en/">
    
    <!-- PWA manifest - ДОБАВЛЕНО -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Минимальные стили для страницы (опционально) -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        a {
            color: white;
            text-decoration: underline;
        }
    </style>
    
    <script>
        // Определяем язык браузера для редиректа
        const userLang = navigator.language.substring(0, 2);
        if (userLang === 'ru') {
            window.location.href = '/ru/';
        } else if (userLang === 'et') {
            window.location.href = '/et/';
        } else {
            window.location.href = '/en/';
        }
    </script>
</head>
<body>
    <p>Redirecting to <a href="/en/">English version</a>...</p>
</body>
</html>
